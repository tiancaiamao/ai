name: CI

on:
  push:
    branches: [main, scratch0]
  pull_request:
    branches: [main]

jobs:
  # Quick tests - no API key required
  test-short:
    name: Quick Tests (No API)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run vet
        run: go vet ./...

      - name: Run quick tests
        run: go test -short -race ./...

  # VCR Replay Tests - no API key required (uses recorded responses)
  test-vcr:
    name: VCR Replay Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run testutil VCR tests
        run: go test -v ./pkg/testutil -run TestVCR -short

      - name: Run agent VCR tests (if any)
        run: go test -v ./pkg/agent -run "TestE2E_1_4|TestE2E_4|TestE2E_7" -short || true

  # Unit tests for specific packages
  test-units:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test context package
        run: go test -v ./pkg/context -short

      - name: Test truncate package
        run: go test -v ./pkg/truncate -short

      - name: Test tools package
        run: go test -v ./pkg/tools -short

      - name: Test config package
        run: go test -v ./pkg/config -short

  # Build verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Tidy go.mod
        run: go mod tidy

      - name: Build all packages
        run: go build ./...

      - name: Build main binary
        run: go build -o ./bin/ai ./cmd/ai

  # Optional: Integration tests (only with secrets)
  test-integration:
    name: Integration Tests (Requires API)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-integration-tests')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        env:
          AI_CONFIG_PATH: ${{ github.workspace }}/test_config.json
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        run: |
          # Create minimal config for testing
          cat > test_config.json << EOF
          {
            "model": {
              "id": "glm-4-flash",
              "provider": "zai",
              "baseUrl": "https://api.z.ai/api/coding/paas/v4",
              "api": "openai-completions",
              "maxTokens": 128000
            }
          }
          EOF

          # Run a few integration tests
          go test -v ./pkg/agent -run "TestE2E_1_1|TestE2E_1_2" -timeout 120s || true