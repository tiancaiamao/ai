version: 1
system_prompt: ./system_prompt.md
memory: ./memory.md
middlewares:
  - name: destructive_guard
    enabled: true
    params:
      protected_patterns:
        - "rm -rf"
        - "rm -r"
        - "kill -9"
        - "mkfs"
        - "dd if="
context_management:
  stale_annotation: false
  stale_age_investigative: 20
  stale_age_modification: 30