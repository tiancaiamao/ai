    dependencies: [T042]

groups:
  - name: phase0-preparation
    title: "Phase 0: Preparation & Safety Net"
    description: "Record baseline coverage, fill test gaps, document dependencies. Safety net before structural changes."
    tasks: [T001, T002, T003]
    commit_message: "test(agent): add baseline coverage and characterization test gaps"

  - name: phase1-rpc-split
    title: "Phase 1: Split rpc_handlers.go via rpcApp Struct"
    description: "Break 2406-line rpc_handlers.go into 5-6 focused files by introducing rpcApp struct to replace closure captures."
    tasks: [T010, T011, T012, T013]
    commit_message: "refactor(cmd): split rpc_handlers.go into focused files with rpcApp struct"

  - name: phase2-compaction
    title: "Phase 2: Unify Compaction Interface"
    description: "Migrate all callers from Old methods to new interface, then delete ~314 lines of legacy compaction code."
    tasks: [T020, T021]
    commit_message: "refactor(compact): unify compaction interface, remove legacy Old methods"

  - name: phase3-loop-split
    title: "Phase 3: Deep Split of runInnerLoop"
    description: "Extract 5 responsibilities from runInnerLoop into helpers, then introduce loopState struct. Target: ~150 lines."
    tasks: [T030, T031, T032, T033, T034, T035]
    commit_message: "refactor(agent): deep split runInnerLoop with loopState struct"

  - name: phase4-stream-split
    title: "Phase 4: Extract streamAssistantResponse"
    description: "Break streaming function into chunk parsing, thinking block handling, and error/retry consolidation."
    tasks: [T040, T041, T042]
    commit_message: "refactor(agent): extract streamAssistantResponse into testable components"

  - name: phase6-cleanup
    title: "Phase 6: Clean Up & Documentation"
    description: "Remove dead code, standardize error handling, update AGENTS.md and dependency docs."
