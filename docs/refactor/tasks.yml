        - `cmd/ai/rpc_message_handlers.go` — `/messages`, `/context`, `/export_html`, hidden message commands
        - `cmd/ai/rpc_config_handlers.go` — `/set`, `/model`, `/thinking`, `/toggle`, `/show`, `/trace-events`, hidden config commands
        - `cmd/ai/rpc_help_handlers.go` — `/help`, `/skills`, `/quit`, `/abort`, `/follow-up`
      - Registration calls in `runRPC` become: `server.RegisterSlash("new", "...", app.handleNew)`
      - Helper functions `getWorkflowStatus` (line 2255), `formatMessagesForDisplay` (line 2352) move to appropriate files

      ## Files
      - CREATE: cmd/ai/rpc_session_handlers.go
      - CREATE: cmd/ai/rpc_message_handlers.go
      - CREATE: cmd/ai/rpc_config_handlers.go
      - CREATE: cmd/ai/rpc_help_handlers.go
      - MODIFY: cmd/ai/rpc_handlers.go (remove migrated code)

      ## Edge cases
