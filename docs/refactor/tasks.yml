  # ===================== Phase 2: Unify Compaction Interface =====================
  - id: T020
    title: "Migrate all callers from Compactor Old methods to new interface"
    description: |
      ## Goal
      Change all 7 call sites that use `ShouldCompactOld`/`CompactOld`/`EstimateContextTokensOld` to use the new `ShouldCompact`/`Compact`/`EstimateTokens` methods instead.

      ## Key changes
      The Old methods accept `[]agentctx.AgentMessage`; the new methods accept `*agentctx.AgentContext`. Callers need to be adapted:

      1. `cmd/ai/rpc_handlers.go` (3 sites after Phase 1, now in `rpcApp` methods):
         - `compactor.ShouldCompactOld(messages)` → `compactor.ShouldCompact(ctx, agentCtx)` where `agentCtx.RecentMessages` contains the messages
         - `compactor.EstimateContextTokensOld(messages)` → `compactor.EstimateTokens(messages)` (if available) or construct AgentContext
         - `compactor.EstimateContextTokensOld(ag.GetMessages())` → same migration

      2. `pkg/agent/compaction_controller.go` (2 sites):
         - `cc.deps.Compactor.ShouldCompactOld(messages)` → `cc.deps.Compactor.ShouldCompact(ctx, agentCtx)`
         - `cc.deps.Compactor.EstimateContextTokensOld(messages)` → new method

      3. `pkg/session/compaction.go` (2 sites):
         - `compactor.EstimateContextTokensOld(messages)` → new method
         - `compactor.EstimateContextTokensOld(updatedContext)` → new method

      Read each file to understand the exact call context and what data is available. The key difference: Old methods take message slices directly; new methods read messages from inside `AgentContext`. If caller already has `AgentContext`, just pass it. If caller only has messages, construct a minimal `AgentContext` or use `EstimateTokens` if available.

      ## Files
      - MODIFY: cmd/ai/rpc_config_handlers.go (or wherever `/compact` handler migrated in Phase 1)
      - MODIFY: pkg/agent/compaction_controller.go
      - MODIFY: pkg/session/compaction.go

      ## Edge cases
      - `/compact` slash command in RPC handler: currently calls `ShouldCompactOld(messages)` and `CompactOld(messages, summary)`. After migration, it needs an `*agentctx.AgentContext`. The `ag.GetContext()` method should provide this.
      - `pkg/session/compaction.go`: check if it has access to `AgentContext` or only message slices. May need to thread `AgentContext` through.

      ## Done when
      - [ ] Zero calls to `ShouldCompactOld`, `CompactOld`, `EstimateContextTokensOld` in non-test code: `grep -rn 'ShouldCompactOld\|CompactOld\|EstimateContextTokensOld' --include='*.go'` returns only definitions in `compact.go`
      - [ ] `go test ./pkg/agent/... ./pkg/session/... ./cmd/ai/... -v` passes
      - [ ] `/compact` slash command still triggers compaction correctly
    estimated_hours: 3
    group: phase2-compaction
    dependencies: [T013]

