      - `/set` handler is large (~330 lines, lines 1156-1488) — it stays in `rpc_config_handlers.go` as a method
      - Keep the `server.Register`/`server.RegisterSlash` call sites in `runRPC` (just point to methods instead of closures)

      ## Done when
