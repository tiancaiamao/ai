  - id: T035
    title: "Introduce loopState struct and finalize runInnerLoop"
    description: |
      ## Goal
      Introduce `type loopState struct` to hold shared loop variables, convert extracted functions to methods, and reduce `runInnerLoop` to ~100-150 lines of skeleton code.

      ## Key changes
      - After T030-T034, the extracted functions share several parameters: `config`, `agentCtx`, `stream`, `compactionRecoveries`, `turnCount`, `loopGuard`, `checkpointMgr`, `emptyResponseRetries`
      - Create `type loopState struct` in a new file `pkg/agent/loop_state.go`:
        ```go
        type loopState struct {
            config           *LoopConfig
            agentCtx         *agentctx.AgentContext
            stream           *llm.EventStream[AgentEvent, []agentctx.AgentMessage]
            compactionRecs   int
            turnCount        int
            loopGuard        *toolLoopGuard
            checkpointMgr    *AgentContextCheckpointManager
            emptyRetries     int
            malformedRecs    int
        }
        ```
      - Create `func newLoopState(config, agentCtx, stream) *loopState`
      - Convert extracted functions to `loopState` methods:
        - `(s *loopState) injectMeta(ctx)`
        - `(s *loopState) performCompaction(ctx) bool`
        - `(s *loopState) executeToolCalls(ctx, toolCalls) []AgentMessage`
        - `(s *loopState) shouldStop(ctx) bool`
        - `(s *loopState) advanceTurn()`
        - `(s *loopState) saveCheckpoint(trigger) error`
        - `(s *loopState) cleanup()`
      - Rewrite `runInnerLoop` to use `loopState`:
        ```go
        func runInnerLoop(ctx, agentCtx, messages, config, stream) {
            state := newLoopState(config, agentCtx, stream)
            defer state.cleanup()
            for {
                if state.shouldStop(ctx) { return }
                if state.performCompaction(ctx) { continue }
                response := callLLM(ctx, state) // or keep streamAssistantResponse as-is
                // ... handle response ...
                toolCalls := parseToolCalls(response)
                if len(toolCalls) == 0 { return }
                state.executeToolCalls(ctx, toolCalls)
                state.advanceTurn()
            }
        }
        ```

      ## Files
      - CREATE: pkg/agent/loop_state.go
      - MODIFY: pkg/agent/loop.go

      ## Done when
      - [ ] `runInnerLoop` is under 150 lines
      - [ ] `loopState` struct exists with all shared state as fields
      - [ ] All extracted functions are `loopState` methods
      - [ ] `go test ./pkg/agent/... -v` passes
      - [ ] All agent behavior preserved (no regressions in characterization tests from T002)
    estimated_hours: 4
    group: phase3-loop-split
    dependencies: [T034]

  # ===================== Phase 4: Extract streamAssistantResponse =====================
  - id: T040
    title: "Extract stream chunk parsing from streamAssistantResponse"
    description: |
      ## Goal
      Extract SSE/JSON chunk parsing logic from `streamAssistantResponse` into a pure, testable function.

      ## Key changes
      - Read `pkg/agent/llm_stream.go` to find the streaming response handler (~400 lines starting at line 19)
      - Identify the chunk parsing section: where raw SSE `data:` lines are deserialized into structured types
      - Extract into a pure function: `func parseStreamChunk(data []byte) (StreamChunkResult, error)` in a new file `pkg/agent/llm_stream_parse.go`
      - The function handles: JSON deserialization, content/reasoning delta extraction, tool call delta parsing
      - Replace inline parsing in `streamAssistantResponse` with calls to `parseStreamChunk`
      - Write unit tests for `parseStreamChunk` with various SSE data payloads

      ## Files
      - CREATE: pkg/agent/llm_stream_parse.go
      - CREATE: pkg/agent/llm_stream_parse_test.go
      - MODIFY: pkg/agent/llm_stream.go

      ## Design decision
      Whether `streamAssistantResponse` becomes a `loopState` method or stays as a package function will be determined here. Evaluate:
      - If Phase 3's `loopState` naturally calls LLM via a method, streamAssistantResponse should be that method's internal helper → stays as package function
      - If `loopState` delegates LLM calls externally, streamAssistantResponse stays as package function
      In either case, the parsing extraction is independent of this decision.

      ## Done when
      - [ ] `parseStreamChunk` is a pure, exported function with unit tests
      - [ ] `streamAssistantResponse` delegates parsing to `parseStreamChunk`
      - [ ] `go test ./pkg/agent/... -v` passes
      - [ ] Stream parsing still handles: text deltas, reasoning deltas, tool call deltas, finish_reason
    estimated_hours: 3
    group: phase4-stream-split
    dependencies: [T035]

  - id: T041
    title: "Extract thinking block processing from streamAssistantResponse"
    description: |
      ## Goal
      Extract thinking block detection and content extraction into a standalone, testable function.

      ## Key changes
      - Read `pkg/agent/llm_stream.go` to find thinking block handling (~60 lines):
        - Detection of thinking start/end in stream
        - Extraction of reasoning content from delta
        - Assembly of thinking content into message blocks
      - Extract into: `func processThinkingBlock(delta AgentMessage) (thinking string, content string, isThinking bool)` or similar
      - Place in `pkg/agent/llm_stream_parse.go` alongside `parseStreamChunk`
      - Write unit tests

      ## Files
      - MODIFY: pkg/agent/llm_stream.go
      - MODIFY: pkg/agent/llm_stream_parse.go
      - MODIFY: pkg/agent/llm_stream_parse_test.go

      ## Done when
      - [ ] Thinking block processing is a testable pure function
      - [ ] `streamAssistantResponse` delegates thinking logic to extracted function
      - [ ] `go test ./pkg/agent/... -v` passes
    estimated_hours: 2
    group: phase4-stream-split
    dependencies: [T040]

  - id: T042
    title: "Consolidate stream error/retry logic"
    description: |
      ## Goal
      Consolidate streaming error handling and retry logic, building on the existing `pkg/agent/llm_retry.go`.

      ## Key changes
      - Read `pkg/agent/llm_retry.go` and `pkg/agent/llm_error_types.go` to understand current retry/error structure
      - Read error handling in `pkg/agent/llm_stream.go` (the retry/recovery paths in `streamAssistantResponse`)
      - Consolidate: ensure retry decision logic lives in `llm_retry.go`, error classification in `llm_error_types.go`
      - `streamAssistantResponse` should call `shouldRetry(err) bool` and `retryDelay(attempt) time.Duration` from `llm_retry.go`
      - Remove any inline retry logic from `streamAssistantResponse`

      ## Files
      - MODIFY: pkg/agent/llm_stream.go
      - MODIFY: pkg/agent/llm_retry.go

      ## Done when
      - [ ] `streamAssistantResponse` has zero inline retry logic — all delegated to `llm_retry.go`
      - [ ] `go test ./pkg/agent/... -v` passes
      - [ ] Stream error recovery (network failure, rate limit, context too long) still works
    estimated_hours: 2
    group: phase4-stream-split
    dependencies: [T041]

  # ===================== Phase 6: Clean Up =====================
  - id: T050
    title: "Remove dead code and update documentation"
    description: |
      ## Goal
      Final cleanup pass: remove dead code exposed by Phases 1-4, standardize error handling, update project documentation.

      ## Key changes
      - Scan for unused functions introduced or exposed during refactoring:
