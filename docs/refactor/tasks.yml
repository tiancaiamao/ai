group_order: [phase0-preparation, phase1-rpc-split, phase2-compaction, phase3-loop-split, phase4-stream-split, phase6-cleanup]

risks:
  - area: "runInnerLoop extraction"
    risk: "Extracted functions may miss shared state interactions (e.g., compaction recovery counter, loop guard)"
    mitigation: "T002 characterization tests cover max turns, tool loop guard, compaction trigger — any regression caught"
  - area: "rpcApp migration"
    risk: "Some closures mutate local variables; missing a mutation breaks behavior silently"
    mitigation: "T010 carefully audits all captured variables; tests in cmd/ai/ cover RPC commands"
  - area: "Compaction interface migration"
    risk: "Old methods accept []Message; new methods accept *AgentContext. Callers may not have AgentContext readily available"
    mitigation: "T020 identifies each caller's context and adapts; Agent.GetContext() provides AgentContext where needed"
  - area: "Test regression"
    risk: "Refactoring breaks behavior that existing 684 tests don't cover"
    mitigation: "Phase 0 fills coverage gaps first; all tests run after every PR"