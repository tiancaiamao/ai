tasks:
  # ===================== Phase 0: Preparation =====================
  - id: T001
    title: "Record baseline test coverage"
    description: |
      ## Goal
      Record the current test coverage baseline for the project before any refactoring begins.

      ## Key changes
      - Run `go test ./... -coverprofile=docs/refactor/baseline.out` to generate coverage profile
      - Run `go tool cover -func=docs/refactor/baseline.out > docs/refactor/baseline-coverage.md` to produce human-readable report
      - Identify top-10 least-covered functions in `pkg/agent/`, `cmd/ai/`, `pkg/compact/`
      - Commit both files under `docs/refactor/`

      ## Files
      - CREATE: docs/refactor/baseline.out
      - CREATE: docs/refactor/baseline-coverage.md

      ## Done when
      - [ ] `docs/refactor/baseline-coverage.md` exists with per-function coverage percentages
      - [ ] Top-10 coverage gaps in agent/cmd/compact packages are listed with function names and file paths
      - [ ] All existing tests still pass: `go test ./...` exits 0 (known failure in pkg/tools is acceptable)
    estimated_hours: 1
    group: phase0-preparation
    dependencies: []

  - id: T002
    title: "Fill characterization test gaps for agent loop"
    description: |
      ## Goal
      Add characterization tests through the Agent public API to cover behavioral gaps identified in T001's coverage report.

      ## Key changes
      - Review T001's coverage gaps for `pkg/agent/loop.go` and `pkg/agent/llm_stream.go`
      - Add tests in `pkg/agent/` using the established `httptest.NewServer` mock LLM pattern (see existing tests in `loop_stream_integration_test.go` for the pattern)
      - Tests must go through `Agent` public API: `NewAgentFromConfigWithContext`, `Prompt`, `Events()`, `Wait()`
      - Focus on gaps only — do NOT rewrite existing tests
      - Priority behaviors to cover if gaps exist:
        1. MaxTurns enforcement: given MaxTurns=2, agent stops after 2 LLM turns even if LLM returns more tool_calls
        2. Tool loop guard: consecutive identical tool call signatures are blocked after threshold
        3. Context cancellation: `ctx.Cancel()` mid-loop produces `EventAgentEnd` with messages accumulated so far
        4. Compaction trigger: when token count exceeds threshold, compaction fires automatically

      ## Files
      - MODIFY: pkg/agent/loop_stream_integration_test.go (or create new test file if more appropriate)

      ## Design decision
      Use public API testing (not internal function testing) because internal tests break when Phase 3 restructures `runInnerLoop`. Public API tests survive the entire refactoring.

      ## Done when
      - [ ] Coverage for `runInnerLoop` and `streamAssistantResponse` is higher than T001 baseline (measurable delta)
      - [ ] All new tests pass: `go test ./pkg/agent/... -v -run TestNew` exits 0
      - [ ] No existing tests broken
    estimated_hours: 3
    group: phase0-preparation
    dependencies: [T001]

