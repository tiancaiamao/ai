      - [ ] `pkg/agent/` dependencies are clearly highlighted
      - [ ] Any circular dependencies are flagged
    estimated_hours: 1
    group: phase0-preparation
    dependencies: []

  # ===================== Phase 1: Split rpc_handlers.go =====================
  - id: T010
    title: "Introduce rpcApp struct to replace closure captures"
    description: |
      ## Goal
      Create an `rpcApp` struct in `cmd/ai/` to hold all local variables currently captured by the 35 `server.Register`/`server.RegisterSlash` closures in `runRPC`.

      ## Key changes
      - Create `cmd/ai/rpc_app.go` with `type rpcApp struct` containing fields for all closure-captured variables:
        - `agent *agent.Agent`
        - `sess *session.Session`
        - `sessionMgr *session.SessionManager`
        - `cfg *config.Config`
        - `compactor *compact.Compactor`
        - `ctxManager *compact.ContextManager`
        - `model llm.Model`
        - `apiKey string`
        - `cwd string`
        - `currentModelInfo` (whatever type is used)
        - `activeSpec` (model spec)
        - `currentContextWindow int`
        - `sessionID string`
        - `sessionName string`
        - `debugAddr string`
        - `server *rpc.Server` (or whatever the RPC server type is)
        - Any other variables captured by closures in `runRPC`
      - Read `cmd/ai/rpc_handlers.go` lines 34-615 (the setup section of `runRPC`) to identify ALL captured variables
      - Create a constructor `func newRPCApp(...) *rpcApp` that encapsulates the setup logic
      - In `runRPC`, construct `app := newRPCApp(...)` and change closures to use `app.field` instead of bare local variables
      - This PR does NOT yet move any handlers to separate files — only introduces the struct

      ## Files
      - CREATE: cmd/ai/rpc_app.go
      - MODIFY: cmd/ai/rpc_handlers.go (refactor `runRPC` to use rpcApp)

      ## Edge cases
      - Some closures may mutate local variables (e.g., session switching). These must become mutations on `app.field`
      - The `runRPC` function signature must not change — it's called from main

      ## Done when
      - [ ] `cmd/ai/rpc_app.go` exists with `type rpcApp struct` containing all closure-captured state
      - [ ] `runRPC` in `rpc_handlers.go` constructs `rpcApp` and all closures use `app.X` instead of bare locals
      - [ ] All tests pass: `go test ./cmd/ai/... -v`
      - [ ] No behavior change — agent still works in RPC mode
    estimated_hours: 4
    group: phase1-rpc-split
    dependencies: [T001]

