  - id: T032
    title: "Extract shared performCompaction from runInnerLoop"
    description: |
      ## Goal
      Extract the compaction check-and-execute logic that appears twice in `runInnerLoop` (pre-LLM threshold + context limit recovery) into a single shared function.

      ## Key changes
      - Read `pkg/agent/loop.go` carefully. The loop has two compaction sites:
        1. Pre-LLM compaction (iterates `config.Compactors`, calls `ShouldCompact`/`Compact`, handles errors, emits events)
        2. Context limit recovery compaction (when LLM returns context-too-long error, also triggers compaction)
      - Extract a shared function: `func performCompaction(ctx context.Context, agentCtx *agentctx.AgentContext, config *LoopConfig, stream *EventStream, trigger string) (*agentctx.CompactionResult, error)`
      - The function handles: iterate compactors → check threshold → execute compact → emit CompactionStart/CompactionEnd events → return result
      - Both call sites in the loop delegate to this function
      - Parameters are explicit (no struct yet) — pass `compactionRecoveries` in/out or use a mutable counter

      ## Files
      - MODIFY: pkg/agent/loop.go

      ## Design decision
      The two compaction sites have slightly different error handling (recovery path resets messages, pre-LLM path just logs). The shared function should handle the common logic; callers handle site-specific post-processing.

      ## Edge cases
      - Compaction recovery counter (`compactionRecoveries`) must be tracked — the function could return a boolean `recovered` or accept a `*int` counter
      - `trigger` parameter differentiates "pre_llm_threshold" vs "context_limit_recovery" for events

      ## Done when
      - [ ] Compaction logic appears once as a shared function, called from two sites in the loop
      - [ ] `go test ./pkg/agent/... -v` passes
      - [ ] Both pre-LLM and recovery compaction still trigger correctly
    estimated_hours: 3
    group: phase3-loop-split
    dependencies: [T031]

