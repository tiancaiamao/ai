        - `server.Register(rpc.CommandAbort, ...)` at line ~790
      - Extract each closure body into `(app *rpcApp) handlePrompt(cmd rpc.RPCCommand) (any, error)` etc.
      - Registration becomes: `server.Register(rpc.CommandPrompt, app.handlePrompt)`
      - These 4 methods stay in `cmd/ai/rpc_handlers.go`

      ## Files
