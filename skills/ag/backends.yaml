backends:
  ai:
    command: ai
    args: ["rpc"]
    protocol: json-rpc
    supports:
      steer: true
      abort: true
      prompt: true

  claude:
    command: claude
    args: ["--output-format", "stream-json", "--input-format", "stream-json"]
    protocol: raw
    supports:
      steer: false
      abort: false
      prompt: false

  codex:
    command: codex
    args: ["exec", "--sandbox", "workspace-write", "--json", "--skip-git-repo-check"]
    protocol: raw
    env:
      - "HTTP_PROXY=http://127.0.0.1:8119"
      - "HTTPS_PROXY=http://127.0.0.1:8119"
    supports:
      steer: false
      abort: false
      prompt: false