name: bugfix
description: Bug fix workflow with verification

phases:
  - id: reproduce
    subject: "Reproduce the bug"
    description: |
      Reproduce and document the bug.
      
      Steps:
      1. Understand the reported issue
      2. Create a minimal reproduction
      3. Document expected vs actual behavior
      4. Identify affected components
      
      Output findings to: .ai/team/outbox/reproduce.md

  - id: diagnose
    subject: "Diagnose root cause"
    description: |
      Find the root cause of the bug.
      
      Steps:
      1. Trace the execution path
      2. Identify where things go wrong
      3. Understand why it happens
      4. Document the root cause
      
      Output diagnosis to: .ai/team/outbox/diagnose.md
    blocked_by:
      - reproduce

  - id: fix
    subject: "Implement the fix"
    description: |
      Implement the bug fix.
      
      Steps:
      1. Implement the minimal fix
      2. Add tests for the fix
      3. Verify no regressions
      
      If the fix requires multiple changes, create sub-tasks:
         orchestrate api create-task --input '{"subject":"...","description":"...","blocked_by":[]}'
      
      Update review task to depend on new tasks.
    blocked_by:
      - diagnose

  - id: verify
    subject: "Verify the fix"
    description: |
      Verify the fix works correctly.
      
      Steps:
      1. Run the reproduction case
      2. Run full test suite
      3. Test edge cases
      4. Document the fix
      
      Output summary to: .ai/team/outbox/verify.md
    blocked_by:
      - fix